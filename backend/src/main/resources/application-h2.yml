# ==================== H2 DATABASE CONFIGURATION ====================
spring:
  datasource:
    url: "jdbc:h2:file:./data/jobtracker;MODE=PostgreSQL;AUTO_SERVER=TRUE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 Console (development only)
  h2:
    console:
      enabled: true
      path: /h2-console
