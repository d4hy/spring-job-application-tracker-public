spring.profiles.active=test
spring.datasource.url=jdbc:h2:mem:jobtracker-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
app.frontend.auto-open=false
app.seed.demo-data=true
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
app.google.oauth.redirect-uri=http://localhost:8080/api/integrations/google/callback
